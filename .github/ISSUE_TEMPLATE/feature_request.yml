name: Feature request
description: Suggest an improvement to Gigabrain.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. Clear product intent helps a lot, especially for memory behavior changes.
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the current pain point or missing capability.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
      description: Describe the change you want, even if it is still rough.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Mention any workarounds or other approaches you considered.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Include examples, screenshots, or links to related issues/discussions.
